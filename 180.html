<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F4F9F0;--bg2:#FAFCF7;--card:#FFFFFF;--card2:#EEF5E8;
  --green:#2D7A3A;--green-light:#3A9E4A;--green-soft:#4CAF50;--green-pale:#E8F5E9;--green-glow:rgba(45,122,58,0.08);
  --dark:#1B3D20;--dark2:#2E5E35;
  --gold:#C5A94E;--gold-soft:rgba(197,169,78,0.1);
  --cream:#FDFFF9;--white:#FFFFFF;
  --text:#1B3D20;--text2:#4A7C54;--text3:#8BAF8F;
  --border:rgba(45,122,58,0.1);
  --radius:16px;--radius-sm:10px;
}
body{
  font-family:'Outfit','Noto Sans Arabic',sans-serif;
  background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:16px;overflow:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 30% 0%,rgba(76,175,80,0.06),transparent),
    radial-gradient(ellipse 50% 40% at 80% 100%,rgba(139,175,143,0.05),transparent);
}
.phone{
  width:100%;max-width:440px;height:90vh;max-height:820px;
  background:var(--bg2);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 0 1px var(--border),0 12px 40px rgba(27,61,32,0.08),0 0 80px rgba(76,175,80,0.04);
}
.hdr{
  padding:20px 20px 16px;display:flex;align-items:center;gap:14px;
  background:var(--white);
  border-bottom:1px solid var(--border);z-index:10;
}
.logo{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),var(--green-light));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2.5px rgba(45,122,58,0.15),0 4px 12px rgba(45,122,58,0.1);
  flex-shrink:0;position:relative;
}
.logo::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(197,169,78,0.3)}
.logo span{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--white);letter-spacing:-0.5px}
.hdr-info{flex:1}
.hdr-name{font-family:'Playfair Display',serif;color:var(--dark);font-size:17px;font-weight:600}
.hdr-sub{color:var(--green);font-size:12px;font-weight:500;margin-top:2px;display:flex;align-items:center;gap:6px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--green-soft);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 6px rgba(76,175,80,0.4)}50%{opacity:0.4;box-shadow:none}}

.chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;background:var(--bg)}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:rgba(45,122,58,0.15);border-radius:4px}

.msg{max-width:82%;padding:12px 16px;font-size:14.5px;line-height:1.6;color:var(--text);animation:si 0.4s cubic-bezier(0.16,1,0.3,1);word-wrap:break-word}
.msg b{color:var(--green)}
.msg.rtl{direction:rtl;text-align:right;font-family:'Noto Sans Arabic','Outfit',sans-serif}
@keyframes si{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.in{align-self:flex-start;background:var(--white);border-radius:2px var(--radius) var(--radius) var(--radius);border:1px solid var(--border);box-shadow:0 1px 4px rgba(27,61,32,0.04)}
.msg.out{align-self:flex-end;background:linear-gradient(135deg,var(--green),var(--green-light));border-radius:var(--radius) 2px var(--radius) var(--radius);color:var(--white);box-shadow:0 2px 8px rgba(45,122,58,0.15)}
.msg .time{font-size:10px;color:var(--text3);text-align:right;margin-top:6px}.msg.out .time{color:rgba(255,255,255,0.5)}

.typing{display:flex;gap:5px;padding:14px 18px;align-self:flex-start;background:var(--white);border-radius:2px var(--radius) var(--radius) var(--radius);border:1px solid var(--border);animation:si 0.3s cubic-bezier(0.16,1,0.3,1)}
.td{width:6px;height:6px;border-radius:50%;background:var(--green-soft);animation:bn 1.4s infinite}.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes bn{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-8px);opacity:1}}

.opts{display:flex;flex-direction:column;gap:8px;max-width:85%;align-self:flex-start;animation:si 0.4s cubic-bezier(0.16,1,0.3,1)}.opts.rtl{direction:rtl}
.opt{
  background:var(--white);border:1.5px solid var(--border);color:var(--green);
  padding:13px 18px;border-radius:var(--radius-sm);font-size:14.5px;
  font-family:'Outfit','Noto Sans Arabic',sans-serif;font-weight:500;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);text-align:left;
  position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 3px rgba(27,61,32,0.04);
}
.opt.rtl{text-align:right;direction:rtl;font-family:'Noto Sans Arabic','Outfit',sans-serif;flex-direction:row-reverse}
.opt:hover{border-color:var(--green);background:var(--green-pale);color:var(--dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(45,122,58,0.1)}
.opt:active{transform:translateY(0)}
.opt-icon{font-size:18px;flex-shrink:0}.opt-text{}

.inarea{padding:12px 16px 16px;display:flex;align-items:center;gap:10px;background:var(--white);border-top:1px solid var(--border)}
.tinput{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 18px;color:var(--text);font-size:14.5px;font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.2s}
.tinput:focus{border-color:var(--green)}.tinput::placeholder{color:var(--text3)}.tinput:disabled{opacity:0.3;cursor:not-allowed}
.tinput.rtl{direction:rtl;text-align:right;font-family:'Noto Sans Arabic','Outfit',sans-serif}
.sbtn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--green-light));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;flex-shrink:0;box-shadow:0 2px 8px rgba(45,122,58,0.2)}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(45,122,58,0.25)}.sbtn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}
.sbtn svg{width:18px;height:18px;fill:var(--white)}

.divider{text-align:center;margin:10px 0;animation:si 0.3s ease}.divider span{background:var(--white);color:var(--text3);font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border)}

.done{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;max-width:85%;align-self:flex-start;animation:si 0.5s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(27,61,32,0.06)}
.done::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green-soft),var(--gold),var(--green-soft))}
.done.rtl{direction:rtl;text-align:right}
.done-icon{font-size:32px;margin-bottom:12px;display:block}
.done h3{font-family:'Playfair Display',serif;color:var(--dark);font-size:18px;margin-bottom:10px;font-weight:600}
.done p{color:var(--text2);font-size:13.5px;line-height:1.7}
.done-contact{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.done-contact a{display:flex;align-items:center;gap:8px;color:var(--green);font-size:13px;text-decoration:none;margin-bottom:8px;transition:color 0.2s}.done-contact a:hover{color:var(--dark)}.done-contact a span{font-size:16px}

.hero{max-width:85%;align-self:flex-start;animation:si 0.6s cubic-bezier(0.16,1,0.3,1);margin-bottom:4px}
.hero-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(27,61,32,0.05)}
.hero-card::before{content:'';position:absolute;top:-40%;right:-20%;width:160px;height:160px;background:radial-gradient(circle,rgba(76,175,80,0.06),transparent 70%);border-radius:50%}
.hero-card::after{content:'';position:absolute;bottom:-30%;left:-10%;width:120px;height:120px;background:radial-gradient(circle,rgba(139,175,143,0.05),transparent 70%);border-radius:50%}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-pale);border:1px solid rgba(45,122,58,0.12);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--green);font-weight:600;letter-spacing:0.5px;margin-bottom:14px;position:relative;z-index:1}
.hero-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--green-soft)}
.hero h2{font-family:'Playfair Display',serif;color:var(--dark);font-size:22px;font-weight:600;line-height:1.3;margin-bottom:8px;position:relative;z-index:1}
.hero h2 em{color:var(--green);font-style:normal}
.hero p{color:var(--text2);font-size:13.5px;line-height:1.6;position:relative;z-index:1}
.hero-contact{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:var(--green-pale);border:1px solid rgba(45,122,58,0.1);padding:4px 10px;border-radius:8px;font-size:11px;color:var(--green);text-decoration:none;transition:all 0.2s;font-weight:500}
.hero-tag:hover{background:var(--green);color:var(--white)}.hero-tag span{font-size:13px}

.hero-cta{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
.hero-cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;flex:1;padding:12px 16px;border-radius:10px;font-size:13.5px;font-weight:600;font-family:'Outfit',sans-serif;text-decoration:none;transition:all 0.25s}
.hero-cta-btn:active{transform:scale(0.98)}
.hero-wa{background:#25D366;color:var(--white);box-shadow:0 3px 12px rgba(37,211,102,0.2)}
.hero-wa:hover{box-shadow:0 4px 20px rgba(37,211,102,0.3);transform:translateY(-1px)}
.hero-wa svg{width:18px;height:18px;fill:var(--white);flex-shrink:0}
.hero-call{background:var(--green-pale);color:var(--green);border:1.5px solid rgba(45,122,58,0.15)}
.hero-call:hover{background:var(--green);color:var(--white);transform:translateY(-1px)}

.done-cta{display:flex;gap:8px;margin-top:14px}
.done-cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;flex:1;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;text-decoration:none;transition:all 0.25s}
.done-cta-wa{background:#25D366;color:var(--white);box-shadow:0 2px 8px rgba(37,211,102,0.15)}
.done-cta-wa:hover{box-shadow:0 4px 16px rgba(37,211,102,0.25);transform:translateY(-1px)}
.done-cta-wa svg{width:16px;height:16px;fill:var(--white);flex-shrink:0}
.done-cta-call{background:var(--green-pale);color:var(--green);border:1.5px solid rgba(45,122,58,0.12)}
.done-cta-call:hover{background:var(--green);color:var(--white)}

@keyframes optPulse{0%{box-shadow:0 0 0 0 rgba(45,122,58,0.15)}70%{box-shadow:0 0 0 6px rgba(45,122,58,0)}100%{box-shadow:0 0 0 0 rgba(45,122,58,0)}}
.opt{animation:optPulse 1.5s ease-out 0.5s 1}
.opt:nth-child(2){animation-delay:0.65s}
.opt:nth-child(3){animation-delay:0.8s}
.opt:nth-child(4){animation-delay:0.95s}
.opt:nth-child(5){animation-delay:1.1s}

@media(max-width:480px){body{padding:0;align-items:stretch}.phone{max-width:100%;height:100vh;max-height:100vh;border-radius:0}}
</style>
</head>
